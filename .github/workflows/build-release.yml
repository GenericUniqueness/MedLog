name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.11.1
          fi
          chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release APK (unsigned for CI)
        run: ./gradlew assembleRelease

      - name: Get version from build.gradle.kts
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APKs
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/MedLog-${{ steps.version.outputs.version }}-debug.apk
          mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/MedLog-${{ steps.version.outputs.version }}-release-unsigned.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: MedLog v${{ steps.version.outputs.version }}
          body: |
            ## MedLog v${{ steps.version.outputs.version }}

            ### APK Downloads
            - **Debug APK**: `MedLog-${{ steps.version.outputs.version }}-debug.apk` — for testing
            - **Release APK** (unsigned): `MedLog-${{ steps.version.outputs.version }}-release-unsigned.apk` — install after enabling "Install from unknown sources"

            ### Features
            - Multi-profile medication & health management
            - 13 Room database entities with offline-first architecture
            - Medication logging, reminders, interaction checking
            - Conditions, appointments, journal, file attachments
            - Dashboard with health metrics & statistics
            - Material 3 design with Jetpack Compose
          files: |
            app/build/outputs/apk/debug/MedLog-${{ steps.version.outputs.version }}-debug.apk
            app/build/outputs/apk/release/MedLog-${{ steps.version.outputs.version }}-release-unsigned.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
